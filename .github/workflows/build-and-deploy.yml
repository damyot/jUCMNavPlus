name: Build and publish update site

# Builds the Tycho update site on every push/PR, and publishes it to GitHub
# Pages on pushes to the default branch and on version tags (v*).
#
# After the first successful Pages deploy, enable Pages in the repo settings:
#   Settings > Pages > Build and deployment > Source: "GitHub Actions".
# Users then install jUCMNav by adding the Pages URL as an update site:
#   https://<org-or-user>.github.io/<repo>/

on:
  push:
    branches: [ master, modernization ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't run overlapping Pages deployments.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the jgit timestamp provider works

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # UI / plug-in tests need a display; provide a virtual one.
      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build (Tycho)
        run: xvfb-run -a mvn -B clean verify

      - name: Upload update site artifact
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-pages-artifact@v3
        with:
          path: seg.jUCMNav.repository/target/repository

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
