name: Build and publish update site

# Builds the Tycho update site on every push/PR, runs the test fragment
# under a virtual display via xvfb, and on pushes to master / v* tags also
# publishes the update site to GitHub Pages.
#
# On every successful build, uploads the update site as a downloadable
# GitHub Actions artifact so PRs from feature branches can be installed
# locally for testing without waiting for a release.
#
# Tests: seg.jUCMNav.tests/ is an eclipse-test-plugin fragment of
# seg.jUCMNav. `mvn -B clean verify` runs the JUnit suite inside a headless
# Eclipse UI harness; failures fail this workflow. See `seg.jUCMNav.tests/pom.xml`
# for surefire configuration (useUIHarness + useUIThread).
#
# After the first successful Pages deploy, enable Pages in the repo settings:
#   Settings > Pages > Build and deployment > Source: "GitHub Actions".
# Users then install jUCMNav by adding the Pages URL as an update site:
#   https://<org-or-user>.github.io/<repo>/

on:
  push:
    branches: [ master, modernization ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't run overlapping Pages deployments.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so the jgit timestamp provider works

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # UI / plug-in tests need a display; provide a virtual one. The
      # eclipse-test-plugin fragment boots a headless workbench during
      # `verify`, which needs a Display.
      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build + test (Tycho)
        run: xvfb-run -a mvn -B clean verify

      # Always: downloadable artifact from the Actions UI. Lets reviewers of
      # PRs from any branch install the built update site locally for testing.
      - name: Upload update site (downloadable artifact)
        uses: actions/upload-artifact@v7
        with:
          name: jucmnav-update-site
          path: seg.jUCMNav.repository/target/repository
          if-no-files-found: error
          retention-days: 30

      # Only on master / tags: drop a landing page into the update site so
      # the Pages root URL doesn't 404 (the p2 repo itself has no index.html),
      # then prepare the Pages artifact for deploy.
      # Pages URL and source URL are derived from the runtime workflow
      # context so they keep working after a repo transfer (e.g. from
      # damyot/ to JUCMNAV/) without a manual template edit.
      - name: Generate landing page
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        env:
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_FULL: ${{ github.repository }}
        run: |
          PAGES_URL="https://${OWNER,,}.github.io/${REPO_NAME}/"
          SOURCE_URL="https://github.com/${REPO_FULL}"
          cat > seg.jUCMNav.repository/target/repository/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>jUCMNav update site</title>
            <style>
              body { font-family: -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
                     max-width: 720px; margin: 4em auto; padding: 0 1em; color: #222; }
              code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
              pre  { background: #f4f4f4; padding: 1em; border-radius: 6px; overflow-x: auto; }
              a    { color: #0366d6; }
            </style>
          </head>
          <body>
            <h1>jUCMNav update site</h1>
            <p>This URL is an Eclipse p2 update site, not a regular web page.</p>
            <h2>Install in Eclipse</h2>
            <ol>
              <li>In Eclipse: <em>Help &rarr; Install New Software&hellip;</em></li>
              <li>Paste this URL into the <em>Work with</em> field:
                  <pre>${PAGES_URL}</pre></li>
              <li>Select <em>jUCMNav</em> and finish the wizard.</li>
            </ol>
            <p>To check for updates later: <em>Help &rarr; Check for Updates</em>.</p>
            <p>Source: <a href="${SOURCE_URL}">${REPO_FULL}</a></p>
          </body>
          </html>
          EOF

      - name: Upload update site (Pages artifact)
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-pages-artifact@v5
        with:
          path: seg.jUCMNav.repository/target/repository

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
